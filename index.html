<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aathma Foundation - Support Request</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; padding: 2rem 1rem; }
.form-wrap { max-width: 640px; margin: 0 auto; }
.logo-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; }
.logo-circle { width: 44px; height: 44px; border-radius: 50%; background: #0F6E56; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 14px; flex-shrink: 0; }
.org-name { font-size: 15px; font-weight: 600; color: #111; }
.org-sub { font-size: 12px; color: #666; }
.lang-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
.lang-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #ccc; background: white; font-size: 13px; cursor: pointer; color: #555; transition: all 0.15s; }
.lang-btn.active { background: #0F6E56; color: white; border-color: #0F6E56; }
.form-card { background: white; border: 1px solid #ddd; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.form-title { font-size: 20px; font-weight: 600; color: #111; margin-bottom: 4px; }
.form-sub { font-size: 13px; color: #666; margin-bottom: 1.5rem; line-height: 1.5; }
.field { margin-bottom: 1.1rem; }
.field label { display: block; font-size: 13px; color: #444; margin-bottom: 5px; font-weight: 500; }
.field input, .field select, .field textarea { width: 100%; padding: 9px 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; background: #fff; color: #111; font-family: inherit; outline: none; transition: border-color 0.15s; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: #0F6E56; box-shadow: 0 0 0 2px rgba(15,110,86,0.1); }
.field textarea { min-height: 90px; resize: vertical; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.submit-btn { width: 100%; padding: 11px; background: #0F6E56; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 0.5rem; transition: opacity 0.15s; }
.submit-btn:hover { opacity: 0.88; }
.success-msg { display: none; text-align: center; padding: 3rem 1rem; background: white; border-radius: 12px; border: 1px solid #ddd; }
.success-icon { width: 56px; height: 56px; border-radius: 50%; background: #E1F5EE; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
</style>
</head>
<body>

<div class="form-wrap">
  <div class="logo-bar">
    <div class="logo-circle">AF</div>
    <div>
      <div class="org-name">support Foundation</div>
      <div class="org-sub">Support for the Elderly · सहायता · ஆதரவு</div>
    </div>
  </div>

  <div class="lang-bar" id="langBar"></div>

  <div class="form-card" id="formCard">
    <div class="form-title" id="formTitle">Support Request Form</div>
    <div class="form-sub" id="formSub">Please fill in your details and we will get back to you shortly.</div>

    <div class="field-row">
      <div class="field">
        <label id="lblName">Full Name</label>
        <input type="text" id="fname" placeholder="Ram Kumar" />
      </div>
      <div class="field">
        <label id="lblAge">Age</label>
        <input type="number" id="age" min="1" max="120" placeholder="75" />
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label id="lblPhone">Phone Number</label>
        <input type="tel" id="phone" placeholder="+91 98765 43210" />
      </div>
      <div class="field">
        <label id="lblEmail">Email Address</label>
        <input type="email" id="email" placeholder="example@email.com" />
      </div>
    </div>

    <div class="field">
      <label id="lblLocation">Location / City</label>
      <input type="text" id="location" placeholder="Delhi" />
    </div>

    <div class="field">
      <label id="lblRequestType">Type of Request</label>
      <select id="requestType">
        <option id="optMedical" value="medical help">Medical Help</option>
        <option id="optFinancial" value="financial help">Financial Assistance</option>
        <option id="optGeneral" value="general query">General Query</option>
      </select>
    </div>

    <div class="field">
      <label id="lblDescription">Describe your request</label>
      <textarea id="description" placeholder="Please describe your situation in detail..."></textarea>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="submitForm()">Submit Request</button>
  </div>

  <div class="success-msg" id="successMsg">
    <div class="success-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#0F6E56" stroke-width="2.5">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <div style="font-size:18px;font-weight:600;color:#111;margin-bottom:8px;" id="successTitle">Request Submitted!</div>
    <div style="font-size:14px;color:#666;" id="successSub">We will contact you within 24 hours.</div>
  </div>
</div>

<script>
const langs = {
  English: {
    btn: "English", title: "Support Request Form",
    sub: "Please fill in your details and we will get back to you shortly.",
    name: "Full Name", age: "Age", phone: "Phone Number", email: "Email Address",
    location: "Location / City", requestType: "Type of Request", description: "Describe your request",
    medical: "Medical Help", financial: "Financial Assistance", general: "General Query",
    submit: "Submit Request", successTitle: "Request Submitted!", successSub: "We will contact you within 24 hours."
  },
  हिंदी: {
    btn: "हिंदी", title: "सहायता अनुरोध फॉर्म",
    sub: "कृपया नीचे अपना विवरण भरें और हम जल्द ही आपसे संपर्क करेंगे।",
    name: "पूरा नाम", age: "आयु", phone: "फोन नंबर", email: "ईमेल पता",
    location: "स्थान / शहर", requestType: "अनुरोध का प्रकार", description: "अपना अनुरोध विस्तार से बताएं",
    medical: "चिकित्सा सहायता", financial: "वित्तीय सहायता", general: "सामान्य प्रश्न",
    submit: "अनुरोध जमा करें", successTitle: "अनुरोध जमा हो गया!", successSub: "हम 24 घंटों के भीतर आपसे संपर्क करेंगे।"
  },
  தமிழ்: {
    btn: "தமிழ்", title: "ஆதரவு கோரிக்கை படிவம்",
    sub: "தயவுசெய்து உங்கள் விவரங்களை கீழே பூர்த்தி செய்யுங்கள்.",
    name: "முழு பெயர்", age: "வயது", phone: "தொலைபேசி எண்", email: "மின்னஞ்சல் முகவரி",
    location: "இடம் / நகரம்", requestType: "கோரிக்கை வகை", description: "உங்கள் கோரிக்கையை விவரிக்கவும்",
    medical: "மருத்துவ உதவி", financial: "நிதி உதவி", general: "பொதுவான கேள்வி",
    submit: "கோரிக்கையை சமர்ப்பிக்கவும்", successTitle: "கோரிக்கை சமர்பிக்கப்பட்டது!", successSub: "24 மணி நேரத்தில் தொடர்பு கொள்வோம்."
  },
  తెలుగు: {
    btn: "తెలుగు", title: "మద్దతు అభ్యర్థన ఫారం",
    sub: "దయచేసి మీ వివరాలను పూరించండి, మేము త్వరలో మీకు తెలియజేస్తాము.",
    name: "పూర్తి పేరు", age: "వయసు", phone: "ఫోన్ నంబర్", email: "ఇమెయిల్ చిరునామా",
    location: "స్థానం / నగరం", requestType: "అభ్యర్థన రకం", description: "మీ అభ్యర్థనను వివరించండి",
    medical: "వైద్య సహాయం", financial: "ఆర్థిక సహాయం", general: "సాధారణ ప్రశ్న",
    submit: "అభ్యర్థన సమర్పించండి", successTitle: "అభ్యర్థన సమర్పించబడింది!", successSub: "24 గంటల్లో మీకు సంప్రదిస్తాము."
  },
  বাংলা: {
    btn: "বাংলা", title: "সহায়তা অনুরোধ ফর্ম",
    sub: "অনুগ্রহ করে নিচে আপনার বিবরণ পূরণ করুন।",
    name: "পুরো নাম", age: "বয়স", phone: "ফোন নম্বর", email: "ইমেইল ঠিকানা",
    location: "অবস্থান / শহর", requestType: "অনুরোধের ধরন", description: "আপনার অনুরোধ বর্ণনা করুন",
    medical: "চিকিৎসা সহায়তা", financial: "আর্থিক সহায়তা", general: "সাধারণ প্রশ্ন",
    submit: "অনুরোধ জমা দিন", successTitle: "অনুরোধ জমা হয়েছে!", successSub: "২৪ ঘন্টার মধ্যে যোগাযোগ করব।"
  },
  मराठी: {
    btn: "मराठी", title: "सहाय्य विनंती फॉर्म",
    sub: "कृपया खालील तपशील भरा आणि आम्ही लवकरच आपल्याशी संपर्क साधू.",
    name: "पूर्ण नाव", age: "वय", phone: "फोन नंबर", email: "ईमेल पत्ता",
    location: "स्थान / शहर", requestType: "विनंतीचा प्रकार", description: "आपली विनंती सांगा",
    medical: "वैद्यकीय सहाय्य", financial: "आर्थिक सहाय्य", general: "सामान्य प्रश्न",
    submit: "विनंती सादर करा", successTitle: "विनंती सादर झाली!", successSub: "आम्ही 24 तासांत संपर्क साधू."
  }
};

let currentLang = "English";
const WEBHOOK_URL = "https://hii1.app.n8n.cloud/webhook/form-submission";

function buildLangBar() {
  const bar = document.getElementById("langBar");
  Object.keys(langs).forEach(l => {
    const btn = document.createElement("button");
    btn.className = "lang-btn" + (l === currentLang ? " active" : "");
    btn.textContent = langs[l].btn;
    btn.onclick = () => switchLang(l);
    bar.appendChild(btn);
  });
}

function switchLang(lang) {
  currentLang = lang;
  const t = langs[lang];
  document.getElementById("formTitle").textContent = t.title;
  document.getElementById("formSub").textContent = t.sub;
  document.getElementById("lblName").textContent = t.name;
  document.getElementById("lblAge").textContent = t.age;
  document.getElementById("lblPhone").textContent = t.phone;
  document.getElementById("lblEmail").textContent = t.email;
  document.getElementById("lblLocation").textContent = t.location;
  document.getElementById("lblRequestType").textContent = t.requestType;
  document.getElementById("lblDescription").textContent = t.description;
  document.getElementById("optMedical").textContent = t.medical;
  document.getElementById("optFinancial").textContent = t.financial;
  document.getElementById("optGeneral").textContent = t.general;
  document.getElementById("submitBtn").textContent = t.submit;
  document.querySelectorAll(".lang-btn").forEach((b, i) => {
    b.className = "lang-btn" + (Object.keys(langs)[i] === lang ? " active" : "");
  });
}

async function submitForm() {
  const data = {
    "FULL name": document.getElementById("fname").value,
    "age": document.getElementById("age").value,
    "phone": document.getElementById("phone").value,
    "location": document.getElementById("location").value,
    "email address": document.getElementById("email").value,
    "preferred language ": currentLang,
    "type of request": document.getElementById("requestType").value,
    "describe request": document.getElementById("description").value
  };
  document.getElementById("submitBtn").textContent = "Submitting...";
  try {
    await fetch(WEBHOOK_URL, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data), mode: "no-cors"
    });
  } catch(e) {}
  const t = langs[currentLang];
  document.getElementById("formCard").style.display = "none";
  document.getElementById("successMsg").style.display = "block";
  document.getElementById("successTitle").textContent = t.successTitle;
  document.getElementById("successSub").textContent = t.successSub;
}

buildLangBar();
</script>
</body>
</html>
